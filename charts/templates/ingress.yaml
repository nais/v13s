apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "v13s.name" . }}-grpc
  labels:
    {{- include "v13s.labels" . | nindent 4 }}
  annotations:
    haproxy.org/backend-config-snippet: |
      retries 2
      default-server proto h2 no-check
      timeout connect 86400s
      http-reuse never
    haproxy.org/timeout-server: "86400s"
spec:
  ingressClassName: internal-haproxy
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "v13s.fullname" . }}
                port:
                  name: grpc
